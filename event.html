<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event on link</title>
    <meta property="og:title" content="You're invited to an event on link!">
    <meta property="og:description" content="Open link to see event details and RSVP.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px 20px; }
        .logo { font-size: 48px; font-weight: 900; letter-spacing: -3px; color: #1447B8; margin-bottom: 12px; }
        .tagline { font-size: 18px; color: #666; margin-bottom: 40px; }
        .message { font-size: 16px; color: #1a1a1a; font-weight: 600; margin-bottom: 8px; }
        .submessage { font-size: 14px; color: #666; margin-bottom: 32px; }
        .buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
        .buttons a { font-size: 15px; text-decoration: none; padding: 10px 24px; border-radius: 10px; transition: all 0.2s; }
        .btn-primary { color: #fff; background: #1447B8; border: 1px solid #1447B8; }
        .btn-primary:hover { background: #0f3a9e; }
        .btn-secondary { color: #1447B8; background: transparent; border: 1px solid #1447B8; }
        .btn-secondary:hover { background: #1447B8; color: #fff; }
        .contact { font-size: 14px; color: #999; }
        .contact a { color: #666; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">link</div>
    <p class="tagline">Your campus, connected.</p>
    <p class="message">You've been invited to an event!</p>
    <p class="submessage">Open link to see the details and RSVP.</p>
    <div class="buttons">
        <a href="#" class="btn-primary" id="openBtn">Open in link</a>
        <a href="https://apps.apple.com/app/link-campus-social/id6761304945" class="btn-secondary" id="downloadBtn">Get the App</a>
    </div>
    <p class="contact">Questions? <a href="mailto:support.linkapp@gmail.com">support.linkapp@gmail.com</a></p>
</div>
<script>
    var APP_STORE_URL = 'https://apps.apple.com/app/link-campus-social/id6761304945';
    var params = new URLSearchParams(window.location.search);
    var eventId = params.get('id');
    var openBtn = document.getElementById('openBtn');
    if (eventId) {
        openBtn.href = 'linkapp://event?id=' + eventId;
    } else {
        openBtn.href = APP_STORE_URL;
    }
</script>
</body>
</html>
