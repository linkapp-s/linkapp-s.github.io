<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event on link</title>
    <meta property="og:title" content="You're invited to an event on link!">
    <meta property="og:description" content="Open link to see event details and RSVP.">
    <meta property="og:type" content="website">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.7;
            color: #1a1a1a;
            background: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 720px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        .logo {
            font-size: 48px;
            font-weight: 900;
            font-style: italic;
            color: #1447B8;
            margin-bottom: 4px;
        }
        .tagline {
            font-size: 15px;
            color: #666;
        }
        .card {
            background: #f9f9f9;
            border-radius: 14px;
            padding: 32px 24px;
            margin-bottom: 32px;
            text-align: center;
        }
        .card h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .card p {
            font-size: 15px;
            color: #666;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 320px;
            margin: 0 auto 48px;
        }
        .btn {
            display: block;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
        }
        .btn-primary {
            background: #1447B8;
            color: white;
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #1a1a1a;
        }
        .footer {
            text-align: center;
            padding-top: 32px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #666;
        }
        .footer a { color: #1447B8; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">link</div>
        <div class="tagline">Campus Social</div>
    </div>

    <div class="card">
        <h1>You've been invited to an event!</h1>
        <p>Open link to see the full event details, RSVP, and join the conversation.</p>
    </div>

    <div class="buttons">
        <a href="#" class="btn btn-primary" id="openBtn">Open in link</a>
        <a href="#" class="btn btn-secondary" id="downloadBtn">Get link on the App Store</a>
    </div>

    <div class="footer">
        <a href="privacy.html">Privacy Policy</a> &nbsp;&middot;&nbsp; <a href="terms.html">Terms of Service</a>
    </div>
</div>

<script>
    var APP_STORE_URL = 'https://apps.apple.com/app/link-campus-social/id__APP_ID__';
    var params = new URLSearchParams(window.location.search);
    var eventId = params.get('id') || '';
    var DEEP_LINK = 'linkapp://event?id=' + eventId;
    var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

    var openBtn = document.getElementById('openBtn');
    var downloadBtn = document.getElementById('downloadBtn');
    downloadBtn.href = APP_STORE_URL;

    openBtn.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = DEEP_LINK;
        setTimeout(function() { window.location.href = APP_STORE_URL; }, 1500);
    });

    if (isIOS && eventId) {
        window.location.href = DEEP_LINK;
    }
</script>
</body>
</html>
